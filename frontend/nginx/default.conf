# Frontend nginx — SPA fallback + /v1 백엔드 프록시 + /healthz.
# 운영(NKS): backend 서비스명을 환경변수 또는 ConfigMap 으로 주입 → ingress 단에서 라우팅.
#           단순 도메인 1개 운영 시 이 파일이 SPA + API 프록시 모두 처리.

# 운영 환경에서 backend 서비스 DNS 를 환경변수로 주입할 수 있도록 placeholder 사용.
# 로컬 컨테이너 단독 기동 시는 "backend:8000" (docker-compose 네트워크 가정).
# 환경변수 미설정 시 fallback.

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # access/error 로그 → stdout/stderr (이미지 기본값)
    # Request ID 전파
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 루트
    root /usr/share/nginx/html;
    index index.html;

    # /healthz — frontend 자체 liveness (200 OK)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # 백엔드 API 프록시
    location /v1/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        client_max_body_size 60m;
    }

    # 업로드 endpoint 별도 (큰 파일 허용 — 영수증 10MB / 일반 파일 50MB)
    location /v1/ingest/file/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        client_max_body_size 60m;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    # /readyz 도 백엔드로
    location = /readyz {
        proxy_pass http://backend_upstream;
    }

    # SPA fallback — /sources, /jobs 등 클라이언트 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐시
    location ~* \.(js|css|svg|png|jpg|jpeg|webp|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
