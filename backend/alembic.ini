# ============================================================================
# Alembic configuration (run from backend/)
# ============================================================================
# - Migration directory is at repo-root migrations/ (see docs/02_ARCHITECTURE.md)
# - DB URL is NOT stored here. env.py loads it from app.config.get_settings()
#   so production secrets are never committed.
# - For full Korean documentation, see docs/03_DATA_MODEL.md and
#   docs/phases/PHASE_1_CORE.md (1.2.3).
# ============================================================================

[alembic]
script_location = ../migrations

# allow env.py to import app.* (relative to backend/)
prepend_sys_path = .

version_locations = %(here)s/../migrations/versions

# file naming: NNNN_<slug>.py
file_template = %%(rev)s_%%(slug)s

timezone = UTC

output_encoding = utf-8

# placeholder; real value set in env.py
sqlalchemy.url = driver://user:pass@host/dbname


# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
