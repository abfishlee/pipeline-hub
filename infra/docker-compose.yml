# Phase 1 로컬 개발 인프라.
# 실행: 프로젝트 루트에서
#   docker compose -f infra/docker-compose.yml --env-file .env up -d
# 또는:
#   make dev-up
#
# 운영용은 별도 docker-compose.prod.yml (Phase 1.2.10 / 배포 가이드 참조).

name: datapipeline-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: dp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datapipeline}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      # 성능 힌트 (로컬 dev 전용, 운영은 Cloud DB가 관리)
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      # 포트 충돌 시 .env 에 POSTGRES_HOST_PORT=5433 같이 override
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 첫 기동 시 1회만 실행 — 추가 DB(airflow 등) / 확장 / 권한 부여 SQL.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-datapipeline}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dp_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      # 포트 충돌 시 .env 에 REDIS_HOST_PORT=6380 같이 override
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: dp_minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # NCP Object Storage가 S3 호환이므로 region 일관성 유지
      MINIO_REGION: kr-standard
    ports:
      # 포트 충돌 시 .env 에 MINIO_API_PORT / MINIO_CONSOLE_PORT 로 override
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-setup:
    # 최초 기동 시 raw 버킷 생성 → 바로 종료
    image: minio/mc:latest
    container_name: dp_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_OS_BUCKET: ${APP_OS_BUCKET:-datapipeline-raw}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/"$$APP_OS_BUCKET"
        mc anonymous set none local/"$$APP_OS_BUCKET"
        echo "[minio-setup] bucket ready: $$APP_OS_BUCKET"
    restart: "no"

  # ----------------------------------------------------------------------
  # 관제 — Phase 1.2.10
  # ----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: dp_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      # Linux 도커에서 host.docker.internal 접근 가능하도록.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ----------------------------------------------------------------------
  # 로그 집계 (Loki + Promtail) — Phase 2.2.9
  # ----------------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    container_name: dp_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/var/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  promtail:
    image: grafana/promtail:3.3.2
    container_name: dp_promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./loki/promtail.yml:/etc/promtail/promtail.yml:ro
      # docker socket 으로 다른 컨테이너 stdout 발견.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp

  # ----------------------------------------------------------------------
  # Worker — Phase 2.2.1 (outbox), Phase 2.2.4 (ocr)
  # ----------------------------------------------------------------------
  # 로컬 개발 시 backend 는 호스트(uvicorn --reload)로 띄우고, 워커는
  # 컨테이너에서 띄우는 것이 일반 패턴. 운영(NKS)은 backend / worker 별도 Deployment.
  # 코드 변경 시 reload 가 필요하면 `--build` 로 다시 빌드.
  x-worker-common: &worker-common
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: &worker-common-deps
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &worker-common-env
      # 컨테이너 내부에서는 서비스 이름으로 접근.
      APP_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-datapipeline}
      APP_REDIS_URL: redis://redis:6379/0
      APP_LOG_JSON: "true"
      APP_LOG_LEVEL: "INFO"
    healthcheck:
      # dramatiq CLI 자체 healthcheck 미제공 — 프로세스 존재 확인만.
      test: ["CMD-SHELL", "pgrep -f 'dramatiq app.workers' >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker-outbox:
    <<: *worker-common
    container_name: dp_worker_outbox
    # uvicorn 대신 dramatiq CLI. tini 가 PID 1 (Dockerfile ENTRYPOINT) 그대로 사용.
    # `--queues outbox` 로 outbox actor 만 소비.
    command:
      ["dramatiq", "app.workers", "--processes", "1", "--threads", "4", "--queues", "outbox"]

  worker-ocr:
    <<: *worker-common
    container_name: dp_worker_ocr
    environment:
      <<: *worker-common-env
      APP_CLOVA_OCR_URL: ${APP_CLOVA_OCR_URL:-}
      APP_CLOVA_OCR_SECRET: ${APP_CLOVA_OCR_SECRET:-}
      APP_UPSTAGE_OCR_URL: ${APP_UPSTAGE_OCR_URL:-https://api.upstage.ai}
      APP_UPSTAGE_API_KEY: ${APP_UPSTAGE_API_KEY:-}
      APP_OCR_CONFIDENCE_THRESHOLD: ${APP_OCR_CONFIDENCE_THRESHOLD:-0.85}
      # OCR 워커는 외부 API 호출이라 더 많은 동시성.
    command:
      ["dramatiq", "app.workers", "--processes", "1", "--threads", "8", "--queues", "ocr"]

  worker-transform:
    <<: *worker-common
    container_name: dp_worker_transform
    environment:
      <<: *worker-common-env
      APP_HYPERCLOVA_API_KEY: ${APP_HYPERCLOVA_API_KEY:-}
      APP_HYPERCLOVA_API_URL: ${APP_HYPERCLOVA_API_URL:-https://clovastudio.stream.ntruss.com}
      APP_HYPERCLOVA_EMBEDDING_APP: ${APP_HYPERCLOVA_EMBEDDING_APP:-/testapp/v1/api-tools/embedding/v2}
      APP_STD_TRIGRAM_THRESHOLD: ${APP_STD_TRIGRAM_THRESHOLD:-0.7}
      APP_STD_EMBEDDING_THRESHOLD: ${APP_STD_EMBEDDING_THRESHOLD:-0.85}
      APP_EMBEDDING_DIM: ${APP_EMBEDDING_DIM:-1536}
    command:
      [
        "dramatiq",
        "app.workers",
        "--processes",
        "1",
        "--threads",
        "8",
        "--queues",
        "transform",
      ]

  worker-price-fact:
    <<: *worker-common
    container_name: dp_worker_price_fact
    environment:
      <<: *worker-common-env
      APP_PRICE_FACT_SAMPLE_RATE: ${APP_PRICE_FACT_SAMPLE_RATE:-0.05}
    command:
      [
        "dramatiq",
        "app.workers",
        "--processes",
        "1",
        "--threads",
        "8",
        "--queues",
        "price_fact",
      ]

  worker-db-incremental:
    <<: *worker-common
    container_name: dp_worker_db_incremental
    # 외부 DB 연결 — extra_hosts 로 host machine 접근 허용 (Linux 도커 포함).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      [
        "dramatiq",
        "app.workers",
        "--processes",
        "1",
        "--threads",
        "4",
        "--queues",
        "db_incremental",
      ]

  worker-crawler:
    <<: *worker-common
    container_name: dp_worker_crawler
    environment:
      <<: *worker-common-env
      APP_CRAWLER_USER_AGENT: ${APP_CRAWLER_USER_AGENT:-datapipeline-crawler/2.2.8 (+https://github.com/abfishlee/pipeline-hub)}
      APP_CRAWLER_TIMEOUT_SEC: ${APP_CRAWLER_TIMEOUT_SEC:-15.0}
      APP_CRAWLER_RESPECT_ROBOTS: ${APP_CRAWLER_RESPECT_ROBOTS:-true}
    command:
      [
        "dramatiq",
        "app.workers",
        "--processes",
        "1",
        "--threads",
        "4",
        "--queues",
        "crawler",
      ]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: dp_grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # 운영 NKS 에서는 OIDC/LDAP 으로 교체.
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------------
  # Apache Airflow — Phase 2.2.3 (LocalExecutor)
  # ----------------------------------------------------------------------
  # 시스템 정기 배치 (집계, 파티션 생성, 아카이브, DB-to-DB 증분 등) 전담.
  # 사용자 정의 파이프라인은 Phase 3 Visual ETL 이 별도로 처리.
  # CeleryExecutor 전환은 Phase 4 NKS — 수평 확장 필요 시점.
  x-airflow-common: &airflow-common
    image: apache/airflow:2.10.4-python3.12
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PARALLELISM: "16"
      AIRFLOW__CORE__DAG_CONCURRENCY: "8"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-fz1Iia1OQHs8ECpOMGiTm0Sd1mI0r9QlmTkKt2qMBqs=}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/airflow
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
      # 메인 애플리케이션 DB / Redis 와 같은 클러스터 — Airflow 가 DAG 안에서 사용할 connection.
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-datapipeline}
      AIRFLOW_CONN_REDIS_DEFAULT: redis://redis:6379/0
      # 개발용 — provider 패키지 자동 설치. 운영(NKS) 은 별도 빌드 이미지로 대체.
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres>=5.13,<6 apache-airflow-providers-redis>=3.8,<4"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on: &airflow-common-deps
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    container_name: dp_airflow_init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        echo "[airflow-init] db migrate"
        airflow db migrate
        echo "[airflow-init] ensure admin user"
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-airflow}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-airflow}" \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.local || true
        # connections 등록 — 환경변수로도 노출되지만, 명시적 등록으로 UI/CLI 가시성 확보.
        airflow connections add postgres_default \
          --conn-uri "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-datapipeline}" || true
        airflow connections add redis_default \
          --conn-uri "redis://redis:6379/0" || true
        echo "[airflow-init] done"

  airflow-webserver:
    <<: *airflow-common
    container_name: dp_airflow_webserver
    restart: unless-stopped
    command: webserver
    depends_on:
      <<: *airflow-common-deps
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: dp_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      <<: *airflow-common-deps
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
