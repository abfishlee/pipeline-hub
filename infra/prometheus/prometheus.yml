# Prometheus 로컬 dev 설정.
# 운영(NKS)에서는 kube-prometheus-stack 의 ServiceMonitor 가 자동 발견.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

scrape_configs:
  # 1) Prometheus 자기 모니터링 (sanity)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # 2) 백엔드 애플리케이션
  #    Docker Desktop 환경: 컨테이너에서 호스트 접근 = host.docker.internal
  #    Linux: docker compose 의 backend 서비스 DNS (Phase 1.2.10 부터 backend 컨테이너 추가 시 변경)
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000", "host.docker.internal:8001"]
        labels:
          service: backend
          env: local
