# Phase 4.2.6 — 두 도메인 공용 보안/성능 설정.
# api.datapipeline.co.kr / app.datapipeline.co.kr 양쪽이 include common.conf;

# --- TLS / HTTPS 강제 ---
# (실제 ssl_certificate / ssl_certificate_key 경로는 운영 환경 deployer 에서 주입.)
ssl_protocols              TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers  on;
ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_session_cache          shared:SSL:50m;
ssl_session_timeout        1d;
ssl_session_tickets        off;
ssl_stapling               on;
ssl_stapling_verify        on;

# --- 보안 헤더 ---
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options          "DENY" always;
add_header X-Content-Type-Options   "nosniff" always;
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

# --- 로깅 (X-Forwarded-For 정규화 + request_id 추출) ---
log_format dp_audit '$remote_addr - $http_x_request_id [$time_iso8601] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream_ms=$upstream_response_time';

# --- 압축 ---
gzip                on;
gzip_min_length     1024;
gzip_types          application/json text/plain text/css application/javascript;

# --- 기본 timeouts ---
proxy_connect_timeout 5s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;
client_max_body_size  10m;

# --- nginx layer 의 추가 가드 — slowapi/Redis 와 별개 ---
# 1 IP 당 동시 connection 100, 1초당 새 connection 50 까지 허용.
# 1 api_key 당 분당 600 (= 평균 10 r/s, peak 20 r/s) — 운영 시 키 단위 limit_req
# zone 추가 정의 가능 ($http_x_api_key 변수 활용).
limit_conn_zone $binary_remote_addr zone=ip_conn:10m;
limit_req_zone  $binary_remote_addr zone=ip_req:10m   rate=50r/s;
limit_req_zone  $http_x_api_key      zone=apikey_req:10m rate=10r/s;
