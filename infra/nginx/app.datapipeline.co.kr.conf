# Phase 4.2.6 — 내부 운영 도메인. 사용자 (운영자/검수자) 가 frontend + 내부 API 사용.
# /public/v1/* 같은 외부 라우트는 본 도메인에서 404 — api.datapipeline.co.kr 로 분리.

server {
    listen      80;
    listen      [::]:80;
    server_name app.datapipeline.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name app.datapipeline.co.kr;

    ssl_certificate     /etc/letsencrypt/live/app.datapipeline.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.datapipeline.co.kr/privkey.pem;

    include /etc/nginx/conf.d/common.conf;

    access_log /var/log/nginx/app_access.log dp_audit;
    error_log  /var/log/nginx/app_error.log warn;

    # /public/* 은 *내부 도메인에서 차단* — 외부 API 는 api.* 도메인에서만.
    location ^~ /public/ {
        return 404;
    }

    # 내부 API.
    location /v1/ {
        limit_conn ip_conn 50;
        limit_req  zone=ip_req burst=50 nodelay;

        proxy_pass http://backend-api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }

    # 운영 헬스체크 + 메트릭.
    location ~ ^/(healthz|readyz|metrics|docs|openapi.json|redoc)(/.*)?$ {
        proxy_pass http://backend-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE.
    location /v1/sse/ {
        proxy_pass http://backend-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_buffering                     off;
        proxy_read_timeout                  3600s;
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Request-ID       $request_id;
    }

    # frontend 정적 (Vite build).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }
}
