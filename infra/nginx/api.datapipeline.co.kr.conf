# Phase 4.2.6 — 외부 API 도메인. /public/v1/* + /public/docs 만 노출.
# 다른 path 는 404 — 내부 라우트 (auth/users 등) 는 절대 노출 X.

server {
    listen      80;
    listen      [::]:80;
    server_name api.datapipeline.co.kr;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.datapipeline.co.kr;

    ssl_certificate     /etc/letsencrypt/live/api.datapipeline.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.datapipeline.co.kr/privkey.pem;

    include /etc/nginx/conf.d/common.conf;

    access_log /var/log/nginx/api_access.log dp_audit;
    error_log  /var/log/nginx/api_error.log warn;

    # /public/v1/* + /public/docs + /public/openapi.json 만 backend 로 프록시.
    location ^~ /public/ {
        # IP / api_key 단위 rate limit (slowapi 와 이중 가드).
        limit_conn ip_conn   100;
        limit_req  zone=ip_req     burst=100 nodelay;
        limit_req  zone=apikey_req burst=20  nodelay;

        proxy_pass http://backend-api:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
    }

    # 그 외는 모두 404 — 내부 라우트 노출 차단.
    location / {
        return 404;
    }
}
