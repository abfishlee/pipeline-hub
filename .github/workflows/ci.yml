name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Repo sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files exist
        run: |
          set -e
          for f in CLAUDE.md README.md .gitignore .editorconfig infra/docker-compose.yml Makefile .env.example; do
            if [ ! -f "$f" ]; then
              echo "❌  missing: $f"
              exit 1
            fi
          done
          echo "✅  repo skeleton OK"

      - name: docker compose config validates
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: cipassword
          MINIO_ROOT_USER: ciuser
          MINIO_ROOT_PASSWORD: cipassword12
          APP_OS_BUCKET: ci-bucket
        run: docker compose -f infra/docker-compose.yml config > /dev/null

  backend:
    name: Backend (lint + type + test)
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - uses: actions/checkout@v4

      - name: Detect scaffolding
        id: detect
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  backend/pyproject.toml 미존재 — Phase 1.2.2 이후 활성화"
          fi

      - name: Install uv
        if: steps.detect.outputs.ready == 'true'
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: uv sync
        if: steps.detect.outputs.ready == 'true'
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff lint
        if: steps.detect.outputs.ready == 'true'
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.ready == 'true'
        working-directory: backend
        run: uv run ruff format --check .

      - name: mypy
        if: steps.detect.outputs.ready == 'true'
        working-directory: backend
        run: uv run mypy app

      - name: pytest
        if: steps.detect.outputs.ready == 'true'
        working-directory: backend
        run: uv run pytest -q

  frontend:
    name: Frontend (lint + type + test)
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - uses: actions/checkout@v4

      - name: Detect scaffolding
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  frontend/package.json 미존재 — Phase 1.2.9 이후 활성화"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.ready == 'true'
        with:
          version: 9

      - name: Setup Node
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        if: steps.detect.outputs.ready == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: steps.detect.outputs.ready == 'true'
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Lint
        if: steps.detect.outputs.ready == 'true'
        working-directory: frontend
        run: pnpm lint

      - name: Test
        if: steps.detect.outputs.ready == 'true'
        working-directory: frontend
        run: pnpm test --run
