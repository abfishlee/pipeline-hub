# SQL 템플릿 라이브러리 메타 — Phase 3.2.8.
#
# 각 템플릿은 같은 디렉토리의 .sql 파일과 1:1 페어. 운영자가 SQL Studio 에서 "템플릿
# 카탈로그" 로 보고 자기 워크플로에 가져와 수정해 사용.
#
# allowed_schemas 는 template 이 SELECT 가능한 schema 화이트리스트 — sqlglot 의
# ALLOWED_SCHEMAS 와 정합. 실제 검증은 SQL Studio validate API 가 수행.
#
# category 는 UI 그룹핑 + sql_query.description 에 prefix 로 저장된다.

templates:
  - file: standardization_validate.sql
    name: stg_standardization_validate
    category: 표준화 검증
    description: stg.daily_prices 의 std_code 매핑 누락 비율 — Phase 2.2.5 표준화 게이트와 정합.
    allowed_schemas: [stg, mart]

  - file: dedup_row_count.sql
    name: stg_dedup_row_count
    category: 중복 진단
    description: dedup 전후 row count 비교 — (sku, captured_at) 기준 중복 비율 산출.
    allowed_schemas: [stg]

  - file: null_pct_per_column.sql
    name: stg_null_pct_per_column
    category: 결측 비율
    description: stg.daily_prices 주요 컬럼별 NULL 비율 — DQ_CHECK null_pct_max 임계 튜닝용.
    allowed_schemas: [stg]

  - file: outlier_mad_per_std.sql
    name: mart_outlier_mad_per_std
    category: 이상치 (MAD)
    description: 표준코드별 MAD (median absolute deviation) 기준 가격 이상치 — 5σ 가까운 row.
    allowed_schemas: [mart]

  - file: price_distribution_bucket.sql
    name: mart_price_distribution_bucket
    category: 가격 분포
    description: width_bucket 으로 mart.product_price 가격 분포 (수집일 기준).
    allowed_schemas: [mart]

  - file: source_staleness.sql
    name: mart_source_staleness
    category: 신선도 (source 별)
    description: source_id 별 마지막 수집 시각 + 24h 이내 row 수 — staleness 모니터링.
    allowed_schemas: [mart]

  - file: store_product_cardinality.sql
    name: mart_store_product_cardinality
    category: 카디널리티
    description: 매장 × 품목 카디널리티 — 특정 매장의 라인업 폭.
    allowed_schemas: [mart]

  - file: mart_vs_stg_consistency.sql
    name: consistency_mart_vs_stg
    category: mart-stg 정합성
    description: 같은 (sku, captured_at) 에 대해 mart 와 stg 의 가격이 동일한지 검사.
    allowed_schemas: [mart, stg]

  - file: missing_source_id_orphan.sql
    name: stg_missing_source_id_orphan
    category: 고아 row 진단
    description: stg.daily_prices 중 source_id 가 NULL 이거나 미래 날짜 captured_at 을 가진 orphan row.
    allowed_schemas: [stg]

  - file: freshness_check_24h.sql
    name: mart_freshness_check_24h
    category: 신선도 (전체)
    description: mart.product_price 의 24h 이내 신규 row 수 + 가장 최근 수집 시각.
    allowed_schemas: [mart]

  - file: top_movers_pct_change.sql
    name: mart_top_movers_pct_change
    category: 이상 변동
    description: 어제 vs 오늘 가격 변동률 ±10% 초과 표준코드 top 50.
    allowed_schemas: [mart]

  - file: workflow_publish_history.sql
    name: wf_publish_history_recent
    category: 배포 이력
    description: 최근 30일간 wf.pipeline_release 배포 이력 — workflow 별 마지막 version_no.
    allowed_schemas: [wf]
